<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="118" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">STAND JULI 2026</text>
  <text x="90" y="172" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">NMN-Status weltweit</text>
  <line x1="90" y1="212" x2="1110" y2="212" stroke="#eceae3" stroke-width="1"/>
  <line x1="595" y1="262" x2="595" y2="600" stroke="#f0eee7" stroke-width="1"/>

  <!-- LEFT COLUMN -->
  <!-- USA -->
  <g>
    <text x="90" y="300" fill="#26251e" font-size="25" font-weight="500">USA</text>
    <rect x="90" y="314" width="150" height="32" rx="16" fill="#4a8c85"/>
    <text x="165" y="336" fill="#ffffff" font-size="16" font-weight="500" text-anchor="middle">erlaubt</text>
    <text x="90" y="374" fill="#6b6b63" font-size="16">Nahrungserg&#228;nzung, FDA best&#228;tigt Ende 2025</text>
  </g>
  <!-- Kanada -->
  <g>
    <text x="90" y="424" fill="#26251e" font-size="25" font-weight="500">Kanada</text>
    <rect x="90" y="438" width="150" height="32" rx="16" fill="#4a8c85"/>
    <text x="165" y="460" fill="#ffffff" font-size="16" font-weight="500" text-anchor="middle">erlaubt</text>
    <text x="90" y="498" fill="#6b6b63" font-size="16">Natural Health Product mit Produktnummer (NPN)</text>
  </g>
  <!-- China -->
  <g>
    <text x="90" y="548" fill="#26251e" font-size="25" font-weight="500">China</text>
    <rect x="90" y="562" width="220" height="32" rx="16" fill="#eeece6"/>
    <text x="200" y="584" fill="#8a8a80" font-size="16" font-weight="500" text-anchor="middle">nicht zugelassen</text>
    <text x="330" y="584" fill="#6b6b63" font-size="16">nur Kosmetikzutat, gro&#223;er Produzent</text>
  </g>

  <!-- RIGHT COLUMN -->
  <!-- Japan -->
  <g>
    <text x="640" y="300" fill="#26251e" font-size="25" font-weight="500">Japan</text>
    <rect x="640" y="314" width="150" height="32" rx="16" fill="#4a8c85"/>
    <text x="715" y="336" fill="#ffffff" font-size="16" font-weight="500" text-anchor="middle">erlaubt</text>
    <text x="640" y="374" fill="#6b6b63" font-size="16">als Lebensmittel seit 2020, gro&#223;er Markt</text>
  </g>
  <!-- Australien -->
  <g>
    <text x="640" y="424" fill="#26251e" font-size="25" font-weight="500">Australien</text>
    <rect x="640" y="438" width="180" height="32" rx="16" fill="#ffffff" stroke="#4a8c85" stroke-width="1.5"/>
    <text x="730" y="460" fill="#3f7a73" font-size="16" font-weight="500" text-anchor="middle">eingeschr&#228;nkt</text>
    <text x="640" y="498" fill="#6b6b63" font-size="16">nur als Arzneimittel, max. 500 mg/Tag</text>
  </g>
  <!-- EU / Deutschland -->
  <g>
    <text x="640" y="548" fill="#26251e" font-size="25" font-weight="500">EU / Deutschland</text>
    <rect x="640" y="562" width="220" height="32" rx="16" fill="#eeece6"/>
    <text x="750" y="584" fill="#8a8a80" font-size="16" font-weight="500" text-anchor="middle">nicht zugelassen</text>
    <text x="880" y="584" fill="#6b6b63" font-size="16">Novel Food, ausstehend</text>
  </g>
</svg>
