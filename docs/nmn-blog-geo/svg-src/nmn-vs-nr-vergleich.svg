<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="118" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">NAD&#8314;-VORSTUFEN IM VERGLEICH</text>
  <text x="90" y="172" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">NMN vs. NR</text>
  <line x1="90" y1="212" x2="1110" y2="212" stroke="#eceae3" stroke-width="1"/>
  <line x1="600" y1="250" x2="600" y2="600" stroke="#f0eee7" stroke-width="1"/>

  <!-- LEFT COLUMN: NMN -->
  <g>
    <text x="90" y="290" fill="#26251e" font-size="28" font-weight="500">NMN</text>
    <text x="90" y="316" fill="#6b6b63" font-size="15">&#946;-Nicotinamid-Mononukleotid</text>
    <line x1="90" y1="336" x2="540" y2="336" stroke="#f0eee7" stroke-width="1"/>

    <text x="90" y="374" fill="#8a8a80" font-size="14" letter-spacing="1">CHEMIE</text>
    <text x="90" y="398" fill="#26251e" font-size="18">Nicotinamid + Ribose + Phosphat</text>

    <text x="90" y="442" fill="#8a8a80" font-size="14" letter-spacing="1">MOLEK&#220;L</text>
    <text x="90" y="466" fill="#26251e" font-size="18">gr&#246;&#223;er, mit Phosphatgruppe</text>

    <text x="90" y="510" fill="#8a8a80" font-size="14" letter-spacing="1">STUDIENLAGE MENSCH</text>
    <text x="90" y="534" fill="#26251e" font-size="18">wachsend, j&#252;ngere Datenlage</text>

    <text x="90" y="578" fill="#8a8a80" font-size="14" letter-spacing="1">EU-STATUS</text>
    <rect x="90" y="590" width="200" height="30" rx="15" fill="#eeece6"/>
    <text x="190" y="610" fill="#8a8a80" font-size="15" font-weight="500" text-anchor="middle">nicht zugelassen</text>
  </g>

  <!-- RIGHT COLUMN: NR -->
  <g>
    <text x="650" y="290" fill="#26251e" font-size="28" font-weight="500">NR</text>
    <text x="650" y="316" fill="#6b6b63" font-size="15">Nicotinamid-Ribosid</text>
    <line x1="650" y1="336" x2="1100" y2="336" stroke="#f0eee7" stroke-width="1"/>

    <text x="650" y="374" fill="#8a8a80" font-size="14" letter-spacing="1">CHEMIE</text>
    <text x="650" y="398" fill="#26251e" font-size="18">Nicotinamid + Ribose, ohne Phosphat</text>

    <text x="650" y="442" fill="#8a8a80" font-size="14" letter-spacing="1">MOLEK&#220;L</text>
    <text x="650" y="466" fill="#26251e" font-size="18">kleiner</text>

    <text x="650" y="510" fill="#8a8a80" font-size="14" letter-spacing="1">STUDIENLAGE MENSCH</text>
    <text x="650" y="534" fill="#26251e" font-size="18">mehr und l&#228;ngere Humanstudien</text>

    <text x="650" y="578" fill="#8a8a80" font-size="14" letter-spacing="1">EU-STATUS</text>
    <rect x="650" y="590" width="150" height="30" rx="15" fill="#4a8c85"/>
    <text x="725" y="610" fill="#ffffff" font-size="15" font-weight="500" text-anchor="middle">zugelassen</text>
  </g>
</svg>
