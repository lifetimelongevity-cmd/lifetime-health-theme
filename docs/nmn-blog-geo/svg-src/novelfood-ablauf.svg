<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="118" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">EU-ZULASSUNG &#183; VO (EU) 2015/2283</text>
  <text x="90" y="172" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">Das Novel-Food-Verfahren in vier Stufen</text>
  <line x1="90" y1="212" x2="1110" y2="212" stroke="#eceae3" stroke-width="1"/>

  <!-- connector -->
  <line x1="180" y1="330" x2="960" y2="330" stroke="#e0ddd4" stroke-width="2"/>
  <g fill="#c9c5ba" font-size="26">
    <text x="303" y="340" text-anchor="middle">&#8250;</text>
    <text x="570" y="340" text-anchor="middle">&#8250;</text>
    <text x="837" y="340" text-anchor="middle">&#8250;</text>
  </g>

  <!-- stage circles -->
  <g>
    <circle cx="180" cy="330" r="30" fill="#4a8c85"/>
    <text x="180" y="340" fill="#ffffff" font-size="26" font-weight="500" text-anchor="middle">1</text>
    <text x="180" y="408" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">Antrag</text>
    <text x="180" y="436" fill="#6b6b63" font-size="16" text-anchor="middle">Unternehmen</text>
    <text x="180" y="460" fill="#8a8a80" font-size="15" text-anchor="middle">Dossier einreichen</text>
  </g>
  <g>
    <circle cx="440" cy="330" r="30" fill="#4a8c85"/>
    <text x="440" y="340" fill="#ffffff" font-size="26" font-weight="500" text-anchor="middle">2</text>
    <text x="440" y="408" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">EFSA-Bewertung</text>
    <text x="440" y="436" fill="#6b6b63" font-size="16" text-anchor="middle">EFSA</text>
    <text x="440" y="460" fill="#8a8a80" font-size="15" text-anchor="middle">Sicherheit, bis 9 Monate</text>
  </g>
  <g>
    <circle cx="700" cy="330" r="30" fill="#4a8c85"/>
    <text x="700" y="340" fill="#ffffff" font-size="26" font-weight="500" text-anchor="middle">3</text>
    <text x="700" y="408" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">Entscheidung</text>
    <text x="700" y="436" fill="#6b6b63" font-size="16" text-anchor="middle">EU-Kommission</text>
    <text x="700" y="460" fill="#8a8a80" font-size="15" text-anchor="middle">Rechtsakt, rund 7 Monate</text>
  </g>
  <g>
    <circle cx="960" cy="330" r="30" fill="#4a8c85"/>
    <text x="960" y="340" fill="#ffffff" font-size="26" font-weight="500" text-anchor="middle">4</text>
    <text x="960" y="408" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">Unionsliste</text>
    <text x="960" y="436" fill="#6b6b63" font-size="16" text-anchor="middle">Eintrag</text>
    <text x="960" y="460" fill="#8a8a80" font-size="15" text-anchor="middle">verkehrsf&#228;hig</text>
  </g>

  <line x1="90" y1="530" x2="1110" y2="530" stroke="#f0eee7" stroke-width="1"/>
  <text x="90" y="574" fill="#6b6b63" font-size="18">Erst nach Stufe 4 ist ein neuartiges Lebensmittel EU-weit verkehrsf&#228;hig. Die EFSA pr&#252;ft die</text>
  <text x="90" y="600" fill="#6b6b63" font-size="18">Sicherheit, zugelassen wird von der EU-Kommission.</text>
</svg>
