<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="118" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">STAND JULI 2026</text>
  <text x="90" y="172" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">Wo NMN im Verfahren steht</text>
  <line x1="90" y1="212" x2="1110" y2="212" stroke="#eceae3" stroke-width="1"/>

  <!-- connector: solid teal up to stage 2, dashed grey after -->
  <line x1="180" y1="360" x2="440" y2="360" stroke="#4a8c85" stroke-width="2"/>
  <line x1="440" y1="360" x2="960" y2="360" stroke="#d8d4ca" stroke-width="2" stroke-dasharray="5 5"/>

  <!-- marker: NMN steht hier (between 2 and 3) -->
  <g>
    <text x="570" y="278" fill="#26251e" font-size="19" font-weight="500" text-anchor="middle">NMN steht hier</text>
    <path d="M570 292 l-9 -13 l18 0 z" fill="#26251e"/>
  </g>

  <!-- stage 1: done -->
  <g>
    <circle cx="180" cy="360" r="30" fill="#4a8c85"/>
    <path d="M167 360 l8 9 l16 -18" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="180" y="438" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">Antrag</text>
    <text x="180" y="466" fill="#4a8c85" font-size="16" font-weight="500" text-anchor="middle">erledigt</text>
  </g>
  <!-- stage 2: done -->
  <g>
    <circle cx="440" cy="360" r="30" fill="#4a8c85"/>
    <path d="M427 360 l8 9 l16 -18" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="440" y="438" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">EFSA-Bewertung</text>
    <text x="440" y="466" fill="#4a8c85" font-size="16" font-weight="500" text-anchor="middle">positiv 2026</text>
    <text x="440" y="490" fill="#8a8a80" font-size="15" text-anchor="middle">bis 300 mg/Tag</text>
  </g>
  <!-- stage 3: pending -->
  <g>
    <circle cx="700" cy="360" r="30" fill="#f2f1ed" stroke="#cfccc3" stroke-width="2"/>
    <text x="700" y="370" fill="#a8a498" font-size="26" font-weight="500" text-anchor="middle">3</text>
    <text x="700" y="438" fill="#8a8a80" font-size="22" font-weight="500" text-anchor="middle">Entscheidung</text>
    <text x="700" y="466" fill="#a8a498" font-size="16" text-anchor="middle">ausstehend</text>
  </g>
  <!-- stage 4: pending -->
  <g>
    <circle cx="960" cy="360" r="30" fill="#f2f1ed" stroke="#cfccc3" stroke-width="2"/>
    <text x="960" y="370" fill="#a8a498" font-size="26" font-weight="500" text-anchor="middle">4</text>
    <text x="960" y="438" fill="#8a8a80" font-size="22" font-weight="500" text-anchor="middle">Unionsliste</text>
    <text x="960" y="466" fill="#a8a498" font-size="16" text-anchor="middle">ausstehend</text>
  </g>

  <line x1="90" y1="536" x2="1110" y2="536" stroke="#f0eee7" stroke-width="1"/>
  <text x="90" y="580" fill="#6b6b63" font-size="18">Bis zum Eintrag in die Unionsliste ist NMN in der EU nicht als Lebensmittel oder</text>
  <text x="90" y="606" fill="#6b6b63" font-size="18">Nahrungserg&#228;nzung zugelassen. Der Stand kann sich &#228;ndern, vor Nutzung neu pr&#252;fen.</text>
</svg>
