<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="118" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">RECHTSSTATUS EU</text>
  <text x="90" y="172" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">NR zugelassen, NMN ausstehend</text>
  <line x1="90" y1="212" x2="1110" y2="212" stroke="#eceae3" stroke-width="1"/>

  <!-- LEFT PANEL: NR authorised -->
  <rect x="90" y="252" width="490" height="288" rx="14" fill="#f2f8f6" stroke="#d6e7e2"/>
  <text x="122" y="308" fill="#26251e" font-size="26" font-weight="500">NR</text>
  <rect x="122" y="326" width="150" height="32" rx="16" fill="#4a8c85"/>
  <text x="197" y="348" fill="#ffffff" font-size="16" font-weight="500" text-anchor="middle">zugelassen</text>
  <text x="122" y="410" fill="#26251e" font-size="18">Als Novel Food seit 2020 zugelassen</text>
  <text x="122" y="446" fill="#6b6b63" font-size="17">Durchf&#252;hrungsverordnung (EU) 2020/16</text>
  <text x="122" y="480" fill="#6b6b63" font-size="17">Nahrungserg&#228;nzung, h&#246;chstens 300 mg/Tag</text>
  <text x="122" y="514" fill="#6b6b63" font-size="17">Auf der Unionsliste eingetragen</text>

  <!-- RIGHT PANEL: NMN pending -->
  <rect x="620" y="252" width="490" height="288" rx="14" fill="#f5f4f0" stroke="#e7e3db"/>
  <text x="652" y="308" fill="#26251e" font-size="26" font-weight="500">NMN</text>
  <rect x="652" y="326" width="200" height="32" rx="16" fill="#eeece6"/>
  <text x="752" y="348" fill="#8a8a80" font-size="16" font-weight="500" text-anchor="middle">nicht zugelassen</text>
  <text x="652" y="410" fill="#26251e" font-size="18">Novel Food, noch nicht zugelassen</text>
  <text x="652" y="446" fill="#6b6b63" font-size="17">EFSA-Sicherheitsbewertung 2026 positiv</text>
  <text x="652" y="480" fill="#6b6b63" font-size="17">Zulassung der EU-Kommission ausstehend</text>
  <text x="652" y="514" fill="#6b6b63" font-size="17">Nicht auf der Unionsliste</text>

  <line x1="90" y1="566" x2="1110" y2="566" stroke="#f0eee7" stroke-width="1"/>
  <text x="90" y="602" fill="#6b6b63" font-size="17">Stand Juli 2026. Die Rechtslage kann sich &#228;ndern, vor Nutzung neu pr&#252;fen.</text>
</svg>
