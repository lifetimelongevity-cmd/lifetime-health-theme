<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="118" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">REGULATORIK IM WANDEL</text>
  <text x="90" y="172" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">J&#252;ngste Bewegungen 2025 bis 2026</text>
  <line x1="90" y1="212" x2="1110" y2="212" stroke="#eceae3" stroke-width="1"/>

  <line x1="280" y1="360" x2="920" y2="360" stroke="#e0ddd4" stroke-width="2"/>

  <!-- Sep 2025 USA -->
  <g>
    <text x="280" y="312" fill="#4a8c85" font-size="21" font-weight="500" text-anchor="middle">Sep 2025</text>
    <circle cx="280" cy="360" r="16" fill="#4a8c85"/>
    <text x="280" y="428" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">USA</text>
    <text x="280" y="456" fill="#6b6b63" font-size="16" text-anchor="middle">FDA erkl&#228;rt NMN</text>
    <text x="280" y="478" fill="#6b6b63" font-size="16" text-anchor="middle">wieder zul&#228;ssig</text>
  </g>
  <!-- Dez 2025 Australien -->
  <g>
    <text x="600" y="312" fill="#4a8c85" font-size="21" font-weight="500" text-anchor="middle">Dez 2025</text>
    <circle cx="600" cy="360" r="16" fill="#4a8c85"/>
    <text x="600" y="428" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">Australien</text>
    <text x="600" y="456" fill="#6b6b63" font-size="16" text-anchor="middle">TGA l&#228;sst NMN als</text>
    <text x="600" y="478" fill="#6b6b63" font-size="16" text-anchor="middle">Arzneimittel zu</text>
  </g>
  <!-- 2026 EU -->
  <g>
    <text x="920" y="312" fill="#a8a498" font-size="21" font-weight="500" text-anchor="middle">2026</text>
    <circle cx="920" cy="360" r="16" fill="#f2f1ed" stroke="#cfccc3" stroke-width="2"/>
    <text x="920" y="428" fill="#26251e" font-size="22" font-weight="500" text-anchor="middle">EU</text>
    <text x="920" y="456" fill="#6b6b63" font-size="16" text-anchor="middle">EFSA positiv,</text>
    <text x="920" y="478" fill="#6b6b63" font-size="16" text-anchor="middle">Zulassung ausstehend</text>
  </g>

  <line x1="90" y1="536" x2="1110" y2="536" stroke="#f0eee7" stroke-width="1"/>
  <text x="90" y="580" fill="#6b6b63" font-size="18">Der weltweite Status &#228;ndert sich schnell. Angaben mit Stand Juli 2026, vor Nutzung neu pr&#252;fen.</text>
</svg>
