<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" font-family="'Helvetica Neue',Arial,sans-serif">
  <rect width="1200" height="675" fill="#f7f4ee"/>
  <rect x="40" y="40" width="1120" height="595" rx="16" fill="#ffffff" stroke="#e7e3db"/>
  <text x="90" y="112" fill="#6b6b63" font-size="17" font-weight="500" letter-spacing="3.5">UTHEVER-STUDIE (HERSTELLERFINANZIERT)</text>
  <text x="90" y="166" fill="#26251e" font-size="40" font-weight="400" letter-spacing="-0.5">NAD/NADH im Blut: Verlauf &#252;ber 60 Tage</text>
  <line x1="90" y1="206" x2="1110" y2="206" stroke="#eceae3" stroke-width="1"/>

  <!-- legend -->
  <rect x="770" y="94" width="20" height="20" rx="3" fill="#4a8c85"/>
  <text x="800" y="110" fill="#26251e" font-size="18">Uthever (NMN)</text>
  <rect x="965" y="94" width="20" height="20" rx="3" fill="#cfccc3"/>
  <text x="995" y="110" fill="#26251e" font-size="18">Placebo</text>

  <!-- gridlines + y labels (0-40 %) -->
  <g stroke="#f0eee7" stroke-width="1">
    <line x1="170" y1="268" x2="1100" y2="268"/>
    <line x1="170" y1="340.5" x2="1100" y2="340.5"/>
    <line x1="170" y1="413" x2="1100" y2="413"/>
    <line x1="170" y1="485.5" x2="1100" y2="485.5"/>
  </g>
  <line x1="170" y1="558" x2="1100" y2="558" stroke="#d8d4ca" stroke-width="1.5"/>
  <g fill="#6b6b63" font-size="16" text-anchor="end">
    <text x="150" y="273">40 %</text>
    <text x="150" y="345.5">30 %</text>
    <text x="150" y="418">20 %</text>
    <text x="150" y="490.5">10 %</text>
    <text x="150" y="563">0 %</text>
  </g>

  <!-- Tag 30 group -->
  <rect x="300" y="558" width="120" height="0.5" fill="#cfccc3"/>
  <rect x="444" y="476" width="120" height="82" fill="#4a8c85"/>
  <text x="360" y="548" fill="#8a8a80" font-size="20" font-weight="500" text-anchor="middle">0 %</text>
  <text x="504" y="466" fill="#26251e" font-size="20" font-weight="500" text-anchor="middle">+11,3 %</text>
  <text x="432" y="588" fill="#6b6b63" font-size="19" text-anchor="middle">Tag 30</text>

  <!-- Tag 60 group -->
  <rect x="736" y="454" width="120" height="104" fill="#cfccc3"/>
  <rect x="880" y="283" width="120" height="275" fill="#4a8c85"/>
  <text x="796" y="444" fill="#26251e" font-size="20" font-weight="500" text-anchor="middle">+14,3 %</text>
  <text x="940" y="273" fill="#26251e" font-size="20" font-weight="500" text-anchor="middle">+38 %</text>
  <text x="868" y="588" fill="#6b6b63" font-size="19" text-anchor="middle">Tag 60</text>

  <text x="90" y="620" fill="#8a8a80" font-size="15">NAD/NADH ist ein Biomarker im Blut, kein Gesundheits-Claim. Ver&#228;nderung gegen&#252;ber Ausgangswert. Quelle: Huang 2022, Frontiers in Aging.</text>
</svg>
